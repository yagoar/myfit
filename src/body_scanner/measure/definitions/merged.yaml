    sources:
      - "references/dpm_videos/bodice_measurements/transcript.txt:L212-216"
      - "references/dpm_videos/bodice_front/transcript.txt:L145-148"

  - name: dpm_bodice_bust_depth_c_on_flf
    seamly_name: null        # derived along full-length-front path; no Seamly equivalent
    aliases: [bust_depth_c]
    type: derived
    source_classification: body
    parameters:
      pose: measurement_default
      derive_from: dpm_bodice_full_length_front
      sample_at: bust_level
      description: |
        Distance along the FLF geodesic from its start (shoulder_neck)
        to where it crosses bust_level.
    sources:
      - "references/dpm_videos/bodice_measurements/transcript.txt:L216-218"
      - "references/dpm_videos/bodice_front/transcript.txt:L148-151"

  - name: dpm_bodice_bust_depth_at_side_seam
    seamly_name: null        # upper-bust to bust along side seam; no Seamly equivalent
    aliases: [bust_depth_at_ss]
    type: derived
    source_classification: body
    parameters:
      pose: measurement_default
      expression: |
        height(landmarks.upper_bust_level @ side_right)
          - height(landmarks.bust_level @ side_right)
      description: |
        Vertical drop from upper_bust_level to bust_level, sampled at
        the side seam (right side).
    sources:
      - "references/dpm_videos/bodice_measurements/transcript.txt:L218-221"

  - name: dpm_bodice_bust_span
    seamly_name: bustpoint_to_bustpoint
    seamly_code: J01
    aliases: [bust_span, apex_to_apex]
    type: planar_segment
