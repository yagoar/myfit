    sources:
      - "references/dpm_videos/bodice_measurements/transcript.txt:L207-212"
      - "references/dpm_videos/bodice_front/transcript.txt:L141-149"

  - name: dpm_bodice_bust_depth_b_on_cf
    seamly_name: neck_front_to_bust_f
    seamly_code: H09
    aliases: [bust_depth_b]
    type: derived
    source_classification: body
    parameters:
