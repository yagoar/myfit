      - "references/dpm_videos/bodice_front/transcript.txt:L166-172"

  - name: dpm_bodice_front_armhole_depth_b_cf
    seamly_name: neck_front_to_highbust_f
    seamly_code: H07
    aliases: [front_armhole_depth_b]
    type: derived
    source_classification: body
    parameters:
      pose: measurement_default
      derive_from: dpm_bodice_center_front_length
      sample_at: upper_bust_level
      description: |
        Vertical distance from front_neck_point to upper_bust_level
        along the centre front.
    sources:
      - "references/dpm_videos/bodice_measurements/transcript.txt:L225-226"
      - "references/dpm_videos/bodice_front/transcript.txt:L175-179"

  - name: dpm_bodice_front_armhole_depth_c_ss
    seamly_name: null        # derived along shoulder-slope-front path; no Seamly equivalent
    aliases: [front_armhole_depth_c]
    type: derived
    source_classification: body
    parameters:
      pose: measurement_default
      derive_from: dpm_bodice_shoulder_slope_front
      sample_at: upper_bust_level
      description: |
        Partial SSF geodesic from acromion_right down the SSF path
        until it crosses upper_bust_level.
    sources:
      - "references/dpm_videos/bodice_measurements/transcript.txt:L226-229"
      - "references/dpm_videos/bodice_front/transcript.txt:L177-179"

  - name: dpm_bodice_across_chest
    seamly_name: across_chest_f
    seamly_code: I03
    aliases: [across_chest]
    type: planar_segment
    source_classification: body
    parameters:
      pose: measurement_default
      plane:
        origin:
          along: -pose.measurement_default.vertical_axis
          from_origin: landmarks.front_neck_point
          distance:
            expression: "0.667 * cf_to_upper_bust_vertical"
            default_fraction_of_cf_to_upper_bust: 0.667
            allowed_range: [0.5, 0.75]
        normal: pose.measurement_default.vertical_axis
      clip:
        start: landmarks.armscye_front_left
        end: landmarks.armscye_front_right
        side: front
      output: arc_length_front
    sources:
      - "references/dpm_videos/bodice_measurements/transcript.txt:L229-240"
      - "references/dpm_videos/bodice_front/transcript.txt:L216-222"
    notes: |
      Front-armhole-to-armhole width segment at a fraction of the
      front_neck_point-to-upper_bust_level vertical distance. dpm
      bodice_measurements suggests "either half or two thirds"; the
      bodice_front drafting video refines this for the meilage to
      ~2/3 down ("a little bit lower than that for DD"). Per dpm's
      figure-dependence note, the rule is a starting heuristic, not a
      universal constant — calibrate per figure.

  - name: dpm_bodice_full_length_back
    seamly_name: neck_side_to_waist_b
    seamly_code: H18
    aliases: [full_length_back, flb]
    type: geodesic_path
    source_classification: body
    parameters:
      pose: measurement_default
      waypoints:
        - landmarks.shoulder_neck_right
        - landmarks.waist_cb
      side: back
    sources:
      - "references/dpm_videos/bodice_measurements/transcript.txt:L240-244"
      - "references/dpm_videos/bodice_measurements/frame_00h24m00s.jpg — \"23. Full Length Back — From High Neck Point to Back Waist\"; back-view body photo with red vertical line from the high neck point straight down to the waist string, plus the back-block diagram showing the same line"
    notes: |
      "from the high neck point to the back waist". dpm recommends
      verifying by also measuring the full body length (front waist up
      through high neck to back waist) and checking flf + flb sums to
      that total.

  - name: dpm_bodice_center_back_length
    seamly_name: neck_back_to_waist_b
    seamly_code: H19
    aliases: [center_back_length, cb_length]
    type: geodesic_path
    source_classification: body
    parameters:
      pose: measurement_default
      waypoints:
        - landmarks.c7
        - landmarks.waist_cb
      side: back
    sources:
      - "references/dpm_videos/bodice_measurements/transcript.txt:L244-246"
    notes: |
      Same physical path as Aldrich #13 Nape to waist. The dpm naming
      is preserved as a separate entry for worksheet parity.

  - name: dpm_bodice_across_shoulder_back
    seamly_name: shoulder_tip_to_shoulder_tip_b
    seamly_code: I07
    aliases: [across_shoulder_back]
    type: planar_segment
    source_classification: body
    parameters:
      pose: measurement_default
      plane:
        origin: landmarks.c7
        normal: pose.measurement_default.vertical_axis
      clip:
        start: landmarks.acromion_left
        end: landmarks.acromion_right
        side: back
      output: arc_length_back
    sources:
      - "references/dpm_videos/bodice_measurements/transcript.txt:L246-250"
    notes: |
      Width across the back at C7 height, from acromion to acromion.
      dpm halves this for the half-block.

  - name: dpm_bodice_shoulder_slope_back
    seamly_name: shoulder_tip_to_waist_back
    seamly_code: K04
    aliases: [shoulder_slope_back, ssb]
    type: geodesic_path
    source_classification: body
    parameters:
      pose: measurement_default
      waypoints:
        - landmarks.acromion_right
        - landmarks.waist_cb
      side: back
    sources:
      - "references/dpm_videos/bodice_measurements/transcript.txt:L250-254"
    notes: |
      "from the shoulder point to the back waist" — surface geodesic
      from acromion to centre-back waist. dpm recommends verifying via
      the front waist + shoulder + back waist combined measurement
      compared against ssf + ssb.

  - name: dpm_bodice_back_armhole_depth_a_ssb
    seamly_name: null        # derived along shoulder-slope-back path; no Seamly equivalent
    aliases: [back_armhole_depth_a]
    type: derived
    source_classification: body
    parameters:
      pose: measurement_default
      derive_from: dpm_bodice_shoulder_slope_back
      sample_at: upper_bust_level
    sources:
      - "references/dpm_videos/bodice_measurements/transcript.txt:L254-258"
    notes: |
      dpm bodice_measurements states explicitly that this back-armhole
      depth is not used to draft the block (the drafting derives the
      armhole from other measurements) — it is a cross-check value.

  - name: dpm_bodice_back_armhole_depth_b_cf
    seamly_name: neck_back_to_highbust_b
    seamly_code: H21
    aliases: [back_armhole_depth_b]
    type: derived
    source_classification: body
    parameters:
      pose: measurement_default
      derive_from: dpm_bodice_center_back_length
      sample_at: upper_bust_level
    sources:
      - "references/dpm_videos/bodice_measurements/transcript.txt:L258-260"

  - name: dpm_bodice_back_armhole_depth_c_flb
    seamly_name: null        # derived along full-length-back path; no Seamly equivalent
    aliases: [back_armhole_depth_c]
    type: derived
    source_classification: body
    parameters:
      pose: measurement_default
      derive_from: dpm_bodice_full_length_back
      sample_at: upper_bust_level
    sources:
      - "references/dpm_videos/bodice_measurements/transcript.txt:L260-261"

  - name: dpm_bodice_back_neck
    seamly_name: neck_arc_half_b
    seamly_code: G34
    aliases: [back_neck]
    type: contoured_path
    source_classification: body
    parameters:
      pose: measurement_default
      closed_loop_through:
        - landmarks.shoulder_neck_left
        - landmarks.c7
        - landmarks.shoulder_neck_right
      side: back
      output: arc_length_back
      tape_below_neckline: true
    sources:
      - "references/dpm_videos/bodice_measurements/transcript.txt:L261-267"
      - "references/dpm_videos/bodice_measurements/frame_00h26m00s.jpg — \"30. Back Neck — From CB Neck to High Neck Point\"; two stacked close-ups of the same shoulder/neck corner with X (incorrect, tape held above the neckline) and ✓ (correct, tape held below the neckline) markings, plus the back-block diagram with a small purple arrow segment from CB to HNP"
    notes: |
      Back half of the neck circumference, from one high_neck_point
      (shoulder_neck) around C7 to the other high_neck_point. dpm
      offers an equivalent: measure all the way around (HNP -> CB ->
      HNP, full back-half loop) and divide by two only if measuring
      one HNP-to-C7 leg directly is awkward. The tape must run below
      the neckline ridge, not above it (dpm shows the smaller-than-
      expected result if the tape sits above).

  - name: dpm_bodice_across_back
    seamly_name: across_back_b
    seamly_code: I08
    aliases: [across_back]
    type: planar_segment
    source_classification: body
    parameters:
      pose: measurement_default
      plane:
        origin:
          along: -pose.measurement_default.vertical_axis
          from_origin: landmarks.c7
          distance:
            expression: "0.5 * c7_to_upper_bust_vertical"
            default_fraction_of_c7_to_upper_bust: 0.5
        normal: pose.measurement_default.vertical_axis
      clip:
        start: landmarks.armscye_back_left
        end: landmarks.armscye_back_right
        side: back
      output: arc_length_back
    sources:
      - "references/dpm_videos/bodice_measurements/transcript.txt:L267-269"
    notes: |
      Back-armhole-to-armhole width segment at half the C7-to-upper-bust
      vertical distance. dpm states "the depth at which you measure
      that is about half the back neck to the upper bust distance".
      Resolves the SPEC.md section 16 open question on Aldrich #4 vs
      dpm #31: Aldrich uses a fixed 15 cm below C7, dpm uses half of
      C7-to-upper-bust which is figure-dependent. The two
      measurements are therefore at different heights and should not
      be aliased to a single body landmark.

  - name: dpm_bodice_dart_placement_back
    seamly_name: null        # drafting choice, not a body measurement
    aliases: [dart_placement_back, back_waist_dart]
    type: derived
    source_classification: derived
    parameters:
      pose: measurement_default
      description: |
        Distance from waist_cb to the desired back-dart position along
        the waist line. dpm explicitly notes this is a personal-
        preference value; default placement = position that yields the
        easiest princess shoulder line for the figure, refined at the
        toile stage.
    sources:
      - "references/dpm_videos/bodice_measurements/transcript.txt:L269-275"
    notes: |
      Not a body measurement; a drafting choice. Listed for worksheet
      parity (dpm worksheet item 32).

  # ------------------------------------------------------------------
  # dpm sleeve body measurements.
  #
  # Source: references/dpm_videos/sleeve/transcript.txt, in particular
  # the section starting at L15 listing the seven sleeve-block inputs.
  # Two of those seven are derived from the bodice blocks (front and
  # back armhole lengths), so only the five body measurements appear
  # here.
  # ------------------------------------------------------------------

  - name: dpm_sleeve_length_bent
    seamly_name: arm_shoulder_tip_to_wrist_bent
    seamly_code: L01
    aliases: [sleeve_length, sleeve_length_dpm]
    type: geodesic_path
    source_classification: body
    parameters:
      pose: bent_arm_sleeve_dpm
      waypoints:
        - landmarks.acromion_right
        - landmarks.elbow_back_right
        - landmarks.wrist_ulnar_right
      side: outer_arm
    sources:
      - "references/dpm_videos/sleeve/transcript.txt:L15-22"
    notes: |
      "the length of the sleeve from the shoulder tip to the wrist with
      the arm bent". Same physical path as Aldrich #20 Sleeve length
      but dpm describes the pose as "arm bent" without requiring the
      hand-on-hip placement, so the joint angles differ slightly.
      Kept as a separate entry for source fidelity; calibration may
      collapse it onto aldrich_sleeve_length if the values agree.

  - name: dpm_sleeve_shoulder_to_elbow
    seamly_name: arm_shoulder_tip_to_elbow_bent
    seamly_code: L02
    aliases: [shoulder_to_elbow]
    type: geodesic_path
    source_classification: body
    parameters:
      pose: bent_arm_sleeve_dpm
      waypoints:
        - landmarks.acromion_right
        - landmarks.elbow_back_right
      side: outer_arm
    sources:
      - "references/dpm_videos/sleeve/transcript.txt:L18-21"
    notes: |
      Surface length from acromion to back-of-elbow with the arm bent.
      Used together with sleeve_length_bent to position the elbow
      dart on the sleeve block.

  - name: dpm_sleeve_elbow_circumference
    seamly_name: arm_elbow_circ_bent
    seamly_code: L04
    aliases: [elbow_circumference]
    type: planar_slice
    source_classification: body
    parameters:
      pose: bent_arm_sleeve_dpm
      plane:
        origin: landmarks.elbow_back_right
        normal: pose.bent_arm_sleeve_dpm.forearm_axis_right
      region_mask: forearm_right
      output: convex_hull_perimeter
    sources:
      - "references/dpm_videos/sleeve/transcript.txt:L18-22"
    notes: |
      "around the elbow with the arm bent". Pose-dependent; the
      circumference is larger than the corresponding straight-arm
      slice because skin stretches over the olecranon.

  - name: dpm_sleeve_bicep
    seamly_name: arm_upper_circ
    seamly_code: L11
    aliases: [bicep, bicep_at_armhole_level]
    type: planar_slice
    source_classification: body
    parameters:
      pose: measurement_default
      plane:
        origin:
          intersection_of:
            - landmarks.upper_bust_level
            - upper_arm_centerline_right
        normal: upper_arm_axis_right
      region_mask: upper_arm_right
      output: convex_hull_perimeter
    sources:
      - "references/dpm_videos/sleeve/transcript.txt:L23-31"
    notes: |
      "around your bicep at the armhole level". dpm specifies the slice
      level by reference to the bodice armhole (upper_bust_level)
      rather than the biceps maximum girth. This differs from
      aldrich_top_arm which measures the biceps at its fullest with
      the arm bent. The two are correlated but not equal.

  - name: dpm_sleeve_cap_height
    seamly_name: null        # no direct Seamly equivalent; derived in drafting
    aliases: [cap_height, sleeve_cap_height]
    type: derived
    source_classification: body
    parameters:
      pose: measurement_default
      expression: |
        height(landmarks.acromion_right) - height(landmarks.upper_bust_level)
      sample_side: right
    sources:
      - "references/dpm_videos/sleeve/transcript.txt:L23-31"
      - "references/dpm_videos/sleeve/transcript.txt:L43-65 (cap-height vs bicep relationship)"
    notes: |
      "from the shoulder tip to the bicep level" — vertical drop from
      acromion to upper_bust_level (the level used as "bicep level" in
      the dpm sleeve block). dpm notes that on a standard figure with
      upright posture, the relationship between cap_height and bicep
      circumference plus 2-inch ease works out without further
      adjustment; on non-standard figures the relationship is the
      single biggest source of fitted-sleeve drafting trouble.

  # ------------------------------------------------------------------
  # dpm pants body measurements.
  #
  # Source: references/dpm_videos/pants_1/transcript.txt
  # ("Drafting the Pants Block: Part 1, Introduction & Measurements").
  # Maria's pants-drafting system uses more measurements than most
  # other pants drafting methods so that non-standard figures fit
  # without major toile alterations. Each measurement here is the
  # one she lists in the "go through the measurements we need" section.
  # ------------------------------------------------------------------

  - name: dpm_pants_waist_to_ankle
    seamly_name: leg_waist_side_to_ankle
    seamly_code: M13
    aliases: [waist_to_ankle]
    type: geodesic_path
    source_classification: body
    parameters:
      pose: measurement_default
      waypoints:
        - landmarks.waist_side_right
        - landmarks.ankle_bone_lateral_right
      side: right
    sources:
      - "references/dpm_videos/pants_1/transcript.txt:L157-159"
    notes: |
      "Measure your waist to ankle down the side of your body, not the
      center front or the center back." Side-of-body surface path.
      An alternative is waist_to_floor (aldrich_waist_to_floor); dpm
      uses waist_to_ankle for the pants block.

  - name: dpm_pants_waist_to_high_hip
    seamly_name: waist_to_highhip_side
    seamly_code: H32
    aliases: [waist_to_high_hip]
    type: derived
    source_classification: body
    parameters:
      pose: measurement_default
      side: right
      depth_cm_short: 10.2     # 4 inches
      depth_cm_medium: 11.4    # 4.5 inches
      depth_cm_tall: 12.7      # 5 inches
      description: |
        Vertical drop from waist_side_right to high_hip_level, taken at
        the side of the body. dpm rule: pick the depth from height:
        4 inches if the user is short, 4.5 inches if medium, 5 inches
        if tall (pants_1 transcript.txt:L161-164).
    sources:
      - "references/dpm_videos/pants_1/transcript.txt:L161-164"

  - name: dpm_pants_high_hip
    seamly_name: highhip_circ        # Seamly: where abdomen protrusion is greatest; dpm: fixed depth below waist (4-5 in)
    seamly_code: G08
    aliases: [high_hip, high_hip_circumference]
    type: planar_slice
    source_classification: body
    parameters:
      pose: measurement_default
      plane:
        origin: landmarks.high_hip_level
        normal: pose.measurement_default.vertical_axis
      region_mask: torso
      output: convex_hull_perimeter
    sources:
      - "references/dpm_videos/pants_1/transcript.txt:L160-164"
    notes: |
      Circumference at high_hip_level (set by waist_to_high_hip).

  - name: dpm_pants_waist_to_low_hip
    seamly_name: waist_to_hip_side
    seamly_code: H35
    aliases: [waist_to_low_hip]
    type: derived
    source_classification: body
    parameters:
      pose: measurement_default
      side: right
      description: |
        Vertical drop from waist_side_right to low_hip_level. low_hip
        is the widest girth below the waist UNLESS the widest girth
        is at high_hip_level or at crotch_level, in which case the
        rule is to use a plane 2.75 inches (~7 cm) above crotch_level
        (pants_1:L169-179).
    sources:
      - "references/dpm_videos/pants_1/transcript.txt:L165-179"

  - name: dpm_pants_low_hip
    seamly_name: hip_circ
    seamly_code: G09
    aliases: [low_hip, low_hip_circumference]
    type: planar_slice
    source_classification: body
    parameters:
      pose: measurement_default
      plane:
        origin:
          search:
            region: torso
            range:
              along: -pose.measurement_default.vertical_axis
              from_origin: landmarks.waist_string
              exclude_levels:
                - landmarks.high_hip_level
                - landmarks.crotch_level
            metric: maximum_horizontal_girth
            fallback_above_crotch_cm: 7.0    # 2.75 inches
        normal: pose.measurement_default.vertical_axis
      region_mask: torso
      output: convex_hull_perimeter
    sources:
      - "references/dpm_videos/pants_1/transcript.txt:L165-179"
      - "references/dpm_videos/pants_3/transcript.txt:L220-233 (curvy-figure tape caveat)"
    notes: |
      Widest girth below the waist. dpm rule: exclude high_hip and
      crotch levels from the search; if the unconstrained widest
      girth would land on either of those, use 2.75 inches above
      crotch instead. This guarantees the pants block has at least
      two width measurements between waist and crotch (high hip + low
      hip).

      pants_3 caveat for very curvy figures: a tape measure wants to
      sit flat and will ride away from the body at the back, so a
      measurement that looks correct can underestimate the true body
      perimeter at that level. The body-scanner pipeline is not
      subject to that tape behaviour (the convex hull of the planar
      slice already gives the taut-perimeter equivalent), but the
      calibration step in Phase 7 should account for the difference
      between tape readings and convex-hull perimeters at this level
      for curvy figures.

  - name: dpm_pants_crotch_depth
    seamly_name: rise_length_side
    seamly_code: N08
    aliases: [crotch_depth, waist_to_crotch]
    type: derived
    source_classification: body
    parameters:
      pose: measurement_default
      side: right
      description: |
        Vertical drop from waist_side_right to crotch_level (where
        the dpm "upper thigh elastic" sits, tied parallel to the
        floor at the crotch).
    sources:
      - "references/dpm_videos/pants_1/transcript.txt:L180-183"

  - name: dpm_pants_upper_thigh
    seamly_name: leg_thigh_upper_circ
    seamly_code: M03
    aliases: [upper_thigh, thigh_at_crotch_level]
    type: planar_slice
    source_classification: body
    parameters:
      pose: measurement_default
      plane:
        origin:
          intersection_of:
            - landmarks.crotch_level
            - thigh_centerline_right
        normal: thigh_axis_right
      region_mask: thigh_right
      output: convex_hull_perimeter
    sources:
      - "references/dpm_videos/pants_1/transcript.txt:L31-32"
      - "references/dpm_videos/pants_1/transcript.txt:L121-133"
      - "references/dpm_videos/pants_1/transcript.txt:L180-184"
      - "references/dpm_videos/pants_1/frame_00h17m00s.jpg — pants-block reference overview: female figure standing, with the body horizons labelled (Waist, High Hip, Low Hip, Crotch, Knee, Ankle) and the upper-thigh region marked with both a vertical \"depth\" arrow (from waist down to crotch level) and a horizontal \"circumference\" loop around the thigh at crotch level"
    notes: |
      Circumference of the right thigh at crotch_level. dpm makes this
      a primary measurement (rather than deriving the crotch
      extensions from the hip-as-proportion) so that non-standard
      figures end up with correct thigh ease and crotch length.

  - name: dpm_pants_waist_to_knee
    seamly_name: leg_waist_side_to_knee
    seamly_code: M14
    aliases: [waist_to_knee]
    type: derived
    source_classification: body
    parameters:
      pose: measurement_default
      side: right
      description: |
        Vertical drop from waist_side_right to mid_knee_level, taken
        at the side of the body.
    sources:
      - "references/dpm_videos/pants_1/transcript.txt:L184"

  - name: dpm_pants_knee
    seamly_name: leg_knee_circ_bent
    seamly_code: M10
    aliases: [knee, knee_circumference_bent]
    type: planar_slice
    source_classification: body
    parameters:
      pose: knee_bent
      plane:
        origin: landmarks.mid_knee_level
        normal: pose.knee_bent.shin_axis_right
      region_mask: knee_right
      output: convex_hull_perimeter
    sources:
      - "references/dpm_videos/pants_1/transcript.txt:L184-186"
    notes: |
      "make sure your knee is fully bent so you can sit comfortably in
      the pants". Pose-dependent; the bent-knee circumference is
      larger than the straight-knee one. Knee_bent pose is a separate
      pose name; joint angles TBD in Phase 6.

  - name: dpm_pants_crotch_length_total
    seamly_name: crotch_length
    seamly_code: N01
    aliases: [crotch_length, total_crotch_length]
    type: geodesic_path
    source_classification: body
    parameters:
      pose: measurement_default
      waypoints:
        - landmarks.waist_cf
        - landmarks.crotch_centre
        - landmarks.waist_cb
      side: midline
    sources:
      - "references/dpm_videos/pants_1/transcript.txt:L186-193"
      - "references/dpm_videos/pants_1/frame_00h21m30s.jpg — the dpm \"sumo nappy\" tester: a horizontal black-elastic loop sized to the waist with a red twill-tape strip sewn at the centre back, looping down through the legs and back up to the centre front, used to physically verify the total crotch length and the front/back split by wearing the device for 10 minutes"
    notes: |
      "from your center front through your legs up to the center back".
      Surface path along the body midline through the crotch. dpm
      stresses this measurement is critical for fit and notoriously
      unreliable when taken once; recommends building a personal
      "sumo nappy" tester from elastic and twill tape and wearing it
      for 10 minutes to validate (pants_1:L196-231).

  - name: dpm_pants_crotch_length_front
    seamly_name: crotch_length_f
    seamly_code: N03
    aliases: [front_crotch_length]
    type: geodesic_path
    source_classification: body
    parameters:
      pose: measurement_default
      waypoints:
        - landmarks.waist_cf
        - landmarks.crotch_centre
      side: front_midline
    sources:
      - "references/dpm_videos/pants_1/transcript.txt:L186-188"
      - "references/dpm_videos/pants_1/transcript.txt:L221-229"
      - "references/dpm_videos/pants_1/frame_00h21m30s.jpg — the dpm sumo-nappy tester (same device as crotch_length_total); after wearing, the front/back split is marked on the twill tape between the legs and the front segment is measured separately"
    notes: |
      Front half of the total crotch length. dpm explicitly: "it's not
      just the full crotch length divided by two" — the front and
      back differ (Maria's own example: back is ~4.5 inches longer
      than front). The dpm tester (sumo-nappy method) is what
      establishes where the front/back split sits, which the body-
      scanner pipeline must replicate via the crotch_centre landmark
      (the point on the midline between landmarks.thigh_at_crotch_left
      and landmarks.thigh_at_crotch_right where a vertical seam
      naturally sits).

  - name: dpm_pants_crotch_length_back
    seamly_name: crotch_length_b
    seamly_code: N02
    aliases: [back_crotch_length]
    type: geodesic_path
    source_classification: body
    parameters:
      pose: measurement_default
      waypoints:
        - landmarks.crotch_centre
        - landmarks.waist_cb
      side: back_midline
    sources:
      - "references/dpm_videos/pants_1/transcript.txt:L186-188"
      - "references/dpm_videos/pants_1/transcript.txt:L221-229"
      - "references/dpm_videos/pants_1/frame_00h21m30s.jpg — the dpm sumo-nappy tester (same device as crotch_length_total); after wearing, the back segment from CB through the legs to the front/back split point is measured separately"
    notes: |
      Back half of the total crotch length. Generally longer than the
      front half. See crotch_length_front notes on the crotch_centre
      landmark.

  # ------------------------------------------------------------------
  # Optional dpm pants measurements. These do not appear on the
  # core pants_1 measurement list but are introduced later in the
  # drafting series for specific figure types or extra shaping help.
  # Marked optional in `notes`. They are body measurements and obey
  # the same source-citation rules as the rest.
  # ------------------------------------------------------------------

  - name: dpm_pants_lower_thigh
    seamly_name: leg_thigh_mid_circ        # Seamly's mid-thigh roughly matches dpm's "~20cm above knee"
    seamly_code: M04
    aliases: [lower_thigh, thigh_above_knee]
    type: planar_slice
    source_classification: body
    parameters:
      pose: measurement_default
      plane:
        origin:
          along: pose.measurement_default.thigh_axis_right
          from_origin: landmarks.mid_knee_level
          distance_cm:
            default_cm: 20         # ~7.5-8 inches above the knee
            allowed_range: [18, 22]
        normal: pose.measurement_default.thigh_axis_right
      region_mask: thigh_right
      output: convex_hull_perimeter
      optional: true
    sources:
      - "references/dpm_videos/pants_4/transcript.txt:L126-130"
      - "references/dpm_videos/pants_5/transcript.txt:L269-271"
    notes: |
      Optional. dpm bodice_measurements + pants_1 do not list it; it is
      introduced in the drafting tutorials for Jane (pants_4) and Anne
      (pants_5) as an additional measurement used to draw a better
      leg-curve from the crotch level down through the knee. Maria's
      verbal definition: "the lower thigh about 8 inches above the
      knee" (~20 cm). Take the planar slice perpendicular to the thigh
      axis at that level, perimeter via convex hull as for upper_thigh
      and knee.

  - name: dpm_pants_intermediate_waist_circumference
    seamly_name: null        # no Seamly equivalent; figure-specific shaping aid
    aliases: [waist_minus_1p5in, anne_intermediate_circumference]
    type: planar_slice
    source_classification: body
    parameters:
      pose: measurement_default
      plane:
        origin:
          along: -pose.measurement_default.vertical_axis
          from_origin: landmarks.waist_string
          distance_cm:
            default_cm: 3.8        # 1.5 inches
            allowed_range: [2.5, 7.5]
        normal: pose.measurement_default.vertical_axis
      region_mask: torso
      output: convex_hull_perimeter
      optional: true
    sources:
      - "references/dpm_videos/pants_5/transcript.txt:L98-103"
    notes: |
      Optional. Introduced in pants_5 (drafting for the apple-shape
      figure "Anne") to help with waist shaping when the standard
      waist-to-high-hip transition is too steep or too shallow.
      Maria's verbal definition: "I've taken that measurement 1 1/2
      inches below the waist" — a planar circumference between the
      waist and the high hip. The exact offset is figure-dependent;
      default 3.8 cm (1.5") with the allowed range covering the
      typical "between waist and high hip" band.

  # ------------------------------------------------------------------
  # Seamly-compatibility geometric measurements.
  #
  # Not measured by Aldrich's p.178 list or by any dpm video. Added so
  # the `aldrich_women_template.smis` slots and its custom @M_* formulas
  # have real values when we ship the SeamlyMe export. Scan-extractable
  # as straight landmark-pair distances; primary source is the Seamly2D
  # measurement catalog rather than a sewing textbook.
  #
  # Unprefixed names (no `aldrich_` / `dpm_` prefix) signal that these
  # are system-agnostic geometric helpers — both per-system exports use
  # them.
  # ------------------------------------------------------------------

  - name: bustpoint_to_waist
    seamly_name: bustpoint_to_waist
    seamly_code: J04
    aliases: [bust_apex_to_waist, bp_to_waist]
    type: planar_segment
    source_classification: body
    parameters:
      pose: measurement_default
      plane:
        origin: landmarks.bust_apex_midpoint
        normal: pose.measurement_default.lateral_axis        # vertical plane through the apex midpoint
      clip:
        start: landmarks.bust_apex_midpoint
        end: landmarks.waist_string        # closest point on the waist plane directly below the apex
        side: chord
      output: chord_distance
    sources:
      - "references/seamly/README.md J04 bustpoint_to_waist (diagram Jp1)"
    notes: |
      Vertical distance from the bust apex midpoint down to the waist
      plane. Used by the SeamlyMe `aldrich_women_template.smis` slot
      `bustpoint_to_waist` (line 29) and by the custom @M_1 "Front
      Shoulder to Waist" formula. Not in Aldrich's p.178 list nor in
      the dpm bodice-measurements video — added purely so the Aldrich
      Seamly template evaluates with real numbers. Scan-extractable as
      the chord between bust_apex_midpoint and the waist_string plane
      along the body's vertical axis.

  - name: bustpoint_to_shoulder_center
    seamly_name: bustpoint_to_shoulder_center
    seamly_code: J10
    aliases: [bp_to_shoulder_centre, bust_apex_to_shoulder_midpoint]
    type: planar_segment
    source_classification: body
    parameters:
      pose: measurement_default
      clip:
        start: landmarks.bust_apex_right
        end: landmarks.front_shoulder_centre_right
        side: chord
      output: chord_distance
    sources:
      - "references/seamly/README.md J10 bustpoint_to_shoulder_center (diagram Jp6)"
    notes: |
      Straight-line distance from the right bust apex to the right
      front-shoulder-centre landmark (midpoint of the front shoulder
      seam between shoulder_neck and acromion). Aldrich's item 15
      "Front shoulder to waist" measures the *path* shoulder-midpoint →
      bust apex → waist as one quantity; this entry separates out the
      shoulder-midpoint → bust apex segment for the SeamlyMe
      `bustpoint_to_shoulder_center` slot (line 39 of
      `aldrich_women_template.smis`) and for the revised @M_1 formula
      (`bustpoint_to_shoulder_center + bustpoint_to_waist`). Not
      independently measured by Aldrich or dpm. Right-side is the
      convention; the half-block draft is mirrored.
