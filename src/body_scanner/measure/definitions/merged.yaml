  - name: dpm_bodice_front_armhole_depth_a_flf
    seamly_name: shoulder_center_to_highbust_f        # approximate; dpm uses high-neck-point as the start, Seamly uses shoulder-centre
    seamly_code: H16
    aliases: [front_armhole_depth_a]
    type: derived
