<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="case" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#8b7dff"/>
      <stop offset="100%" stop-color="#5b46e8"/>
    </linearGradient>
    <linearGradient id="tape" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#fffbe8"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
  </defs>

  <!-- flowing ribbon: dark outline + cream fill via stroke trick -->
  <path d="M 32 22
           C 48 26, 56 34, 50 44
           C 44 54, 28 56, 16 50"
        fill="none" stroke="#1c1730" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 32 22
           C 48 26, 56 34, 50 44
           C 44 54, 28 56, 16 50"
        fill="none" stroke="url(#tape)" stroke-width="9.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- tick marks along the ribbon (hand-placed perpendiculars) -->
  <g stroke="#1c1730" stroke-width="1.4" stroke-linecap="round" fill="none">
    <line x1="40" y1="23" x2="41" y2="28"/>
    <line x1="46" y1="27" x2="49" y2="31"/>
    <line x1="50" y1="34" x2="54" y2="35"/>
    <line x1="50" y1="41" x2="54" y2="40"/>
    <line x1="46" y1="48" x2="48" y2="52"/>
    <line x1="38" y1="52" x2="39" y2="57"/>
    <line x1="28" y1="54" x2="28" y2="59"/>
  </g>

  <!-- coil donut at top -->
  <circle cx="22" cy="22" r="13.5" fill="#1c1730"/>
  <circle cx="22" cy="22" r="11.5" fill="url(#case)"/>
  <circle cx="22" cy="22" r="5.5"  fill="#fffbe8"/>
  <circle cx="22" cy="22" r="2"    fill="#1c1730"/>
  <!-- coil highlight -->
  <path d="M 14 17 Q 18 13 24 13" fill="none" stroke="#cfc4ff"
        stroke-width="1.8" stroke-linecap="round" opacity=".7"/>
</svg>
